name: Sync API Docs

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  repository_dispatch:
    types: [sync-api-docs]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4

      - name: Checkout derbyfish-web
        uses: actions/checkout@v4
        with:
          repository: AGFarms/derbyfish-web
          path: repos/derbyfish-web
          token: ${{ secrets.GITBOOK_API_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate API docs
        run: node scripts/generate-api-docs.js repos/derbyfish-web api/endpoints.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/endpoints.md
          git diff --cached --quiet || git commit -m "docs: auto-generate API endpoint reference"
          git push
